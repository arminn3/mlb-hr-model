name: Daily HR Prop Model

on:
  schedule:
    # Run hourly from 7 AM to 9 PM ET (11:00 to 01:00+1 UTC)
    # Results tracker + ML trainer only on first run (11:00 UTC / 7 AM ET)
    - cron: '0 11 * * *'   # 7:00 AM ET
    - cron: '0 12 * * *'   # 8:00 AM ET
    - cron: '0 13 * * *'   # 9:00 AM ET
    - cron: '0 14 * * *'   # 10:00 AM ET
    - cron: '0 15 * * *'   # 11:00 AM ET
    - cron: '0 16 * * *'   # 12:00 PM ET
    - cron: '0 17 * * *'   # 1:00 PM ET
    - cron: '0 18 * * *'   # 2:00 PM ET
    - cron: '0 19 * * *'   # 3:00 PM ET
    - cron: '0 20 * * *'   # 4:00 PM ET
    - cron: '0 21 * * *'   # 5:00 PM ET
    - cron: '0 22 * * *'   # 6:00 PM ET
    - cron: '0 23 * * *'   # 7:00 PM ET
    - cron: '0 0 * * *'    # 8:00 PM ET
    - cron: '0 1 * * *'    # 9:00 PM ET
    - cron: '0 2 * * *'    # 10:00 PM ET
    - cron: '0 3 * * *'    # 11:00 PM ET
    - cron: '0 4 * * *'    # 12:00 AM ET (midnight — results after last game)
  workflow_dispatch: # allow manual trigger

concurrency:
  group: hr-model-run
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-model:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt scikit-learn

      - name: Restore Statcast cache
        uses: actions/cache@v4
        with:
          path: statcast_cache/
          key: statcast-cache-${{ github.run_id }}
          restore-keys: statcast-cache-

      # Results tracker: 7 AM (yesterday's results) + 10 PM/11 PM/midnight (today's results as games end)
      - name: Run results tracker
        if: github.event.schedule == '0 11 * * *' || github.event.schedule == '0 2 * * *' || github.event.schedule == '0 3 * * *' || github.event.schedule == '0 4 * * *' || github.event_name == 'workflow_dispatch'
        run: python results_tracker.py || true
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      # ML trainer writes to results/ml_analysis.json only.
      # HR Rankings still uses static config.py weights — not affected.
      - name: Run ML trainer
        if: github.event.schedule == '0 11 * * *' || github.event_name == 'workflow_dispatch'
        run: python ml_trainer.py || true

      - name: Run projection trainer
        if: github.event.schedule == '0 11 * * *' || github.event_name == 'workflow_dispatch'
        run: python projection_trainer.py || true

      - name: Save batted balls
        if: github.event.schedule == '0 11 * * *' || github.event.schedule == '0 2 * * *' || github.event.schedule == '0 3 * * *' || github.event.schedule == '0 4 * * *' || github.event_name == 'workflow_dispatch'
        run: python save_batted_balls.py || true

      - name: Run HR prop model
        run: python main.py --fast
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Copy results to frontend
        run: |
          mkdir -p frontend/public/data/results
          cp results/*.json frontend/public/data/results/ 2>/dev/null || true

      - name: Commit and push results
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          # Only stash the files this run actually regenerates. Historical
          # dated JSONs (2026-04-14.json, etc.) are NEVER touched by this
          # cron run, so we must NOT overwrite them — manual patches made
          # between checkout and push (like Lowe 4/14 Mikolas) would be
          # lost otherwise.
          TODAY=$(date -u +%Y-%m-%d)
          mkdir -p /tmp/hrprop-stash/frontend-data
          mkdir -p /tmp/hrprop-stash/results
          [ -f "frontend/public/data/latest.json" ] && cp "frontend/public/data/latest.json" /tmp/hrprop-stash/frontend-data/ || true
          [ -f "frontend/public/data/${TODAY}.json" ] && cp "frontend/public/data/${TODAY}.json" /tmp/hrprop-stash/frontend-data/ || true
          [ -f "frontend/public/data/index.json" ] && cp "frontend/public/data/index.json" /tmp/hrprop-stash/frontend-data/ || true
          # results/ files — copy everything generated this run (small dir)
          cp -r results/. /tmp/hrprop-stash/results/ 2>/dev/null || true
          # Also stash the results subfolder that gets synced
          mkdir -p /tmp/hrprop-stash/frontend-data/results
          cp -r frontend/public/data/results/. /tmp/hrprop-stash/frontend-data/results/ 2>/dev/null || true

          git reset --hard HEAD
          git fetch origin main
          # Retry up to 3 times in case of race with another run
          for i in 1 2 3; do
            git reset --hard origin/main
            # Restore ONLY the files this run regenerated — never touch
            # historical dated JSONs from origin.
            [ -f "/tmp/hrprop-stash/frontend-data/latest.json" ] && cp "/tmp/hrprop-stash/frontend-data/latest.json" frontend/public/data/ || true
            [ -f "/tmp/hrprop-stash/frontend-data/${TODAY}.json" ] && cp "/tmp/hrprop-stash/frontend-data/${TODAY}.json" frontend/public/data/ || true
            [ -f "/tmp/hrprop-stash/frontend-data/index.json" ] && cp "/tmp/hrprop-stash/frontend-data/index.json" frontend/public/data/ || true
            cp -r /tmp/hrprop-stash/frontend-data/results/. frontend/public/data/results/ 2>/dev/null || true
            cp -r /tmp/hrprop-stash/results/. results/ 2>/dev/null || true
            git add frontend/public/data/ results/
            git diff --cached --quiet && echo "No changes after reset" && exit 0
            git commit -m "auto: HR props $(date -u +%Y-%m-%d-%H%M)"
            if git push origin main; then
              echo "Pushed successfully on attempt $i"
              exit 0
            fi
            echo "Push attempt $i failed, origin moved. Retrying..."
            git fetch origin main
          done
          echo "Push failed after 3 attempts"
          exit 1
