name: Daily HR Prop Model

on:
  schedule:
    # Run hourly from 7 AM to 9 PM ET (11:00 to 01:00+1 UTC)
    # Results tracker + ML trainer only on first run (11:00 UTC / 7 AM ET)
    - cron: '0 11 * * *'   # 7:00 AM ET
    - cron: '0 12 * * *'   # 8:00 AM ET
    - cron: '0 13 * * *'   # 9:00 AM ET
    - cron: '0 14 * * *'   # 10:00 AM ET
    - cron: '0 15 * * *'   # 11:00 AM ET
    - cron: '0 16 * * *'   # 12:00 PM ET
    - cron: '0 17 * * *'   # 1:00 PM ET
    - cron: '0 18 * * *'   # 2:00 PM ET
    - cron: '0 19 * * *'   # 3:00 PM ET
    - cron: '0 20 * * *'   # 4:00 PM ET
    - cron: '0 21 * * *'   # 5:00 PM ET
    - cron: '0 22 * * *'   # 6:00 PM ET
    - cron: '0 23 * * *'   # 7:00 PM ET
    - cron: '0 0 * * *'    # 8:00 PM ET
    - cron: '0 1 * * *'    # 9:00 PM ET
    - cron: '0 2 * * *'    # 10:00 PM ET
    - cron: '0 3 * * *'    # 11:00 PM ET
    - cron: '0 4 * * *'    # 12:00 AM ET (midnight — results after last game)
  workflow_dispatch: # allow manual trigger

concurrency:
  group: hr-model-run
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-model:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt scikit-learn

      - name: Restore Statcast cache
        uses: actions/cache@v4
        with:
          path: statcast_cache/
          key: statcast-cache-${{ github.run_id }}
          restore-keys: statcast-cache-

      # Results tracker: 7 AM (yesterday's results) + 10 PM/11 PM/midnight (today's results as games end)
      - name: Run results tracker
        if: github.event.schedule == '0 11 * * *' || github.event.schedule == '0 2 * * *' || github.event.schedule == '0 3 * * *' || github.event.schedule == '0 4 * * *' || github.event_name == 'workflow_dispatch'
        run: python results_tracker.py || true
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      # ML trainer disabled — training data still contaminated from old model bugs
      # Re-enable once we have 7+ days of clean data
      # - name: Run ML trainer
      #   if: github.event.schedule == '0 11 * * *' || github.event_name == 'workflow_dispatch'
      #   run: python ml_trainer.py || true

      - name: Run projection trainer
        if: github.event.schedule == '0 11 * * *' || github.event_name == 'workflow_dispatch'
        run: python projection_trainer.py || true

      - name: Save batted balls
        if: github.event.schedule == '0 11 * * *' || github.event.schedule == '0 2 * * *' || github.event.schedule == '0 3 * * *' || github.event.schedule == '0 4 * * *' || github.event_name == 'workflow_dispatch'
        run: python save_batted_balls.py || true

      - name: Run HR prop model
        run: python main.py --fast
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Copy results to frontend
        run: |
          mkdir -p frontend/public/data/results
          cp results/*.json frontend/public/data/results/ 2>/dev/null || true

      - name: Commit and push results
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add frontend/public/data/ results/
          git stash
          git pull --rebase origin main || git rebase --abort
          git stash pop || true
          git add frontend/public/data/ results/
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "auto: HR props $(date -u +%Y-%m-%d-%H%M)"
          git push origin main || true
